<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DealRadar</title>
<style>
  :root {
    --bg: #101418; --panel: #1a2027; --panel-2: #212a33;
    --text: #e8edf2; --muted: #8fa0b0; --accent: #ffb454;
    --green: #63d68b; --red: #ff7a7a; --border: #2c3641;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 5;
  }
  h1 { font-size: 20px; margin: 0 8px 0 0; letter-spacing: .5px; }
  h1 span { color: var(--accent); }
  .grow { flex: 1; }
  input[type=search], input[type=number], select {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 8px 12px; outline: none;
  }
  input[type=search] { width: 200px; }
  input[type=number] { width: 100px; }
  button {
    background: var(--accent); color: #1a1205; border: 0; border-radius: 8px;
    padding: 8px 14px; font-weight: 600; cursor: pointer;
  }
  button.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
  button:disabled { opacity: .5; cursor: wait; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 24px 0; }
  .chips.items { padding-top: 8px; }
  .chips .label { color: var(--muted); font-size: 12px; align-self: center; margin-right: 2px; }
  .chip {
    background: var(--panel); border: 1px solid var(--border); color: var(--muted);
    border-radius: 999px; padding: 5px 13px; cursor: pointer; font-size: 13px;
  }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #1a1205; font-weight: 600; }

  /* ---- product grid, like a shop ---- */
  main {
    padding: 18px 24px 60px; max-width: 1240px; margin: 0 auto;
    display: grid; gap: 16px;
    grid-template-columns: repeat(auto-fill, minmax(215px, 1fr));
  }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden; cursor: pointer; display: flex; flex-direction: column;
    transition: transform .12s ease, border-color .12s ease;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .thumb {
    position: relative; aspect-ratio: 1 / 1; background: var(--panel-2);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb .noimg { font-size: 44px; opacity: .35; }
  .badge {
    position: absolute; top: 8px; left: 8px; border-radius: 8px;
    padding: 2px 8px; font-weight: 700; font-size: 13px; background: rgba(16,20,24,.85);
  }
  .badge.hi { color: var(--green); } .badge.mid { color: var(--accent); } .badge.lo { color: var(--red); }
  .pricechip {
    position: absolute; bottom: 8px; right: 8px; background: rgba(16,20,24,.88);
    color: var(--green); font-weight: 800; border-radius: 8px; padding: 2px 9px; font-size: 15px;
  }
  .cardbody { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 6px; }
  .cardtitle {
    font-weight: 600; font-size: 13.5px; line-height: 1.35;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    min-height: 2.7em;
  }
  .cardmeta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; font-size: 11.5px; color: var(--muted); }
  .storetag {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 0 6px; font-size: 11px;
  }
  .cat { color: var(--accent); font-weight: 600; }
  .empty { grid-column: 1 / -1; text-align: center; color: var(--muted); padding: 60px 0; }

  /* ---- detail modal ---- */
  .overlay {
    position: fixed; inset: 0; background: rgba(5,8,11,.72); z-index: 20;
    display: none; align-items: center; justify-content: center; padding: 24px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
    max-width: 860px; width: 100%; max-height: 90vh; overflow: auto;
    display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  }
  @media (max-width: 700px) { .modal { grid-template-columns: 1fr; } }
  .modalimg {
    background: var(--panel-2); min-height: 320px; display: flex;
    align-items: center; justify-content: center; overflow: hidden;
  }
  .modalimg img { width: 100%; height: 100%; object-fit: contain; max-height: 70vh; }
  .modalimg .noimg { font-size: 90px; opacity: .3; }
  .modalbody { padding: 22px; display: flex; flex-direction: column; gap: 12px; position: relative; }
  .modalbody h2 { margin: 0; font-size: 19px; line-height: 1.35; padding-right: 30px; }
  .bigprice { color: var(--green); font-size: 26px; font-weight: 800; }
  .modalmeta { display: flex; gap: 8px; flex-wrap: wrap; font-size: 13px; color: var(--muted); align-items: center; }
  .take {
    background: var(--panel-2); border-left: 3px solid var(--accent); border-radius: 8px;
    padding: 10px 12px; font-size: 14px; color: var(--text); font-style: italic;
  }
  .scoreline { font-size: 14px; color: var(--muted); }
  .scoreline b.hi { color: var(--green); } .scoreline b.mid { color: var(--accent); } .scoreline b.lo { color: var(--red); }
  a.gobtn {
    background: var(--accent); color: #1a1205; text-decoration: none; text-align: center;
    border-radius: 10px; padding: 12px; font-weight: 700; font-size: 15px; margin-top: auto;
  }
  .close {
    position: absolute; top: 12px; right: 14px; background: none; border: 0;
    color: var(--muted); font-size: 22px; cursor: pointer; padding: 2px 6px;
  }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: 14px; display: none; z-index: 30;
  }
</style>
</head>
<body>
<header>
  <h1>🛰️ Deal<span>Radar</span></h1>
  <div class="grow"></div>
  <input id="search" type="search" placeholder="Search deals…">
  <select id="store"><option value="All">All stores</option></select>
  <input id="maxprice" type="number" min="0" step="1" placeholder="Max $">
  <select id="age">
    <option value="24">Last 24h</option>
    <option value="48" selected>Last 48h</option>
    <option value="168">Last 7d</option>
    <option value="">All time</option>
  </select>
  <select id="order">
    <option value="new" selected>Newest</option>
    <option value="best">Best score</option>
  </select>
  <button id="refresh">Refresh deals</button>
  <button id="notify" class="secondary" title="Post top 5 deals to your Discord webhook">Post to Discord</button>
</header>

<div class="chips" id="chips"></div>
<div class="chips items" id="itemChips"></div>
<div class="chips items" id="liveline" style="color:var(--muted);font-size:12.5px;"></div>

<main id="grid"><div class="empty">Loading…</div></main>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>
<div class="toast" id="toast"></div>

<script>
  let activeCategory = "All";
  let activeItem = "All";
  let currentDeals = [];
  const ITEM_TYPES = ["All", "Jeans", "Shorts", "Tee", "Hoodie", "Jacket", "Sneaker", "Shoe", "Dress", "Sweater"];
  const $ = (id) => document.getElementById(id);

  function toast(msg) {
    const t = $("toast");
    t.textContent = msg; t.style.display = "block";
    clearTimeout(t._h); t._h = setTimeout(() => t.style.display = "none", 4000);
  }
  function esc(s) { const d = document.createElement("div"); d.textContent = s ?? ""; return d.innerHTML; }
  function scoreClass(s) { return s >= 8 ? "hi" : s >= 5 ? "mid" : "lo"; }

  function timeAgo(iso) {
    if (!iso) return "";
    const t = new Date(iso.includes("T") ? iso : iso.replace(" ", "T") + "Z");
    const mins = Math.max(0, Math.round((Date.now() - t) / 60000));
    if (mins < 60) return `${mins}m ago`;
    if (mins < 1440) return `${Math.round(mins / 60)}h ago`;
    return `${Math.round(mins / 1440)}d ago`;
  }

  async function loadStatus() {
    try {
      const s = await (await fetch("/api/status")).json();
      const when = s.last_refresh_at ? `sources checked ${timeAgo(s.last_refresh_at)}` : "first check pending";
      $("liveline").textContent =
        `🟢 Live — ${when} · auto-refresh every ${s.auto_refresh_minutes} min · board updates every 60s`;
    } catch { /* non-fatal */ }
  }

  async function loadCategories() {
    const { categories } = await (await fetch("/api/categories")).json();
    const total = categories.reduce((s, c) => s + c.n, 0);
    const all = [{ category: "All", n: total }, ...categories];
    $("chips").innerHTML = all.map(c =>
      `<div class="chip ${c.category === activeCategory ? "active" : ""}"
            onclick="setCategory('${c.category}')">${c.category} <b>${c.n}</b></div>`
    ).join("");
  }
  function setCategory(cat) { activeCategory = cat; loadCategories(); loadDeals(); }

  function renderItemChips() {
    $("itemChips").innerHTML = `<span class="label">Item:</span>` + ITEM_TYPES.map(t =>
      `<div class="chip ${t === activeItem ? "active" : ""}" onclick="setItem('${t}')">${t}</div>`
    ).join("");
  }
  function setItem(t) { activeItem = t; renderItemChips(); loadDeals(); }

  async function loadStores() {
    const { stores } = await (await fetch("/api/stores")).json();
    const sel = $("store");
    const current = sel.value;
    sel.innerHTML = `<option value="All">All stores</option>` +
      stores.map(s => `<option value="${esc(s.store)}">${esc(s.store)} (${s.n})</option>`).join("");
    if ([...sel.options].some(o => o.value === current)) sel.value = current;
  }

  function thumbHTML(d) {
    const img = d.image_url
      ? `<img src="${esc(d.image_url)}" loading="lazy" alt=""
             onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'noimg',textContent:'🛍️'}))">`
      : `<div class="noimg">🛍️</div>`;
    const badge = d.ai_score ? `<div class="badge ${scoreClass(d.ai_score)}">★ ${d.ai_score}</div>` : "";
    const price = d.price != null ? `<div class="pricechip">$${d.price}</div>` : "";
    return `<div class="thumb">${img}${badge}${price}</div>`;
  }

  async function loadDeals() {
    const params = new URLSearchParams();
    if (activeCategory !== "All") params.set("category", activeCategory);
    if (activeItem !== "All") params.set("item", activeItem);
    const q = $("search").value.trim();
    if (q) params.set("q", q);
    const store = $("store").value;
    if (store !== "All") params.set("store", store);
    const maxPrice = $("maxprice").value;
    if (maxPrice) params.set("max_price", maxPrice);
    const age = $("age").value;
    if (age) params.set("max_age_hours", age);
    params.set("order", $("order").value);

    const { deals } = await (await fetch("/api/deals?" + params)).json();
    currentDeals = deals;
    if (!deals.length) {
      $("grid").innerHTML = `<div class="empty">Nothing fresh matches — widen the time window or hit <b>Refresh deals</b>.</div>`;
      return;
    }
    $("grid").innerHTML = deals.map((d, i) => `
      <div class="card" onclick="openModal(${i})">
        ${thumbHTML(d)}
        <div class="cardbody">
          <div class="cardtitle">${esc(d.title)}</div>
          <div class="cardmeta">
            ${d.store ? `<span class="storetag">${esc(d.store)}</span>` : ""}
            <span class="cat">${esc(d.category)}</span>
            <span>· ${timeAgo(d.posted_at || d.fetched_at)}</span>
          </div>
        </div>
      </div>`).join("");
  }

  function openModal(i) {
    const d = currentDeals[i];
    if (!d) return;
    const img = d.image_url
      ? `<img src="${esc(d.image_url)}" alt=""
             onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'noimg',textContent:'🛍️'}))">`
      : `<div class="noimg">🛍️</div>`;
    $("modal").innerHTML = `
      <div class="modalimg">${img}</div>
      <div class="modalbody">
        <button class="close" onclick="closeModal()" title="Close">✕</button>
        <h2>${esc(d.title)}</h2>
        ${d.price != null ? `<div class="bigprice">$${d.price}</div>` : ""}
        <div class="modalmeta">
          ${d.store ? `<span class="storetag">${esc(d.store)}</span>` : ""}
          <span class="cat">${esc(d.category)}</span>
          <span>· via ${esc(d.source)}</span>
          <span>· ${timeAgo(d.posted_at || d.fetched_at)}</span>
        </div>
        ${d.ai_score ? `<div class="scoreline">AI deal score: <b class="${scoreClass(d.ai_score)}">${d.ai_score}/10</b></div>` : ""}
        ${d.ai_take ? `<div class="take">“${esc(d.ai_take)}”</div>` : ""}
        <a class="gobtn" href="${esc(d.url)}" target="_blank" rel="noopener">Open deal ↗</a>
      </div>`;
    $("overlay").classList.add("open");
  }
  function closeModal() { $("overlay").classList.remove("open"); }
  $("overlay").addEventListener("click", (e) => { if (e.target === $("overlay")) closeModal(); });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

  $("refresh").onclick = async () => {
    const btn = $("refresh");
    btn.disabled = true; btn.textContent = "Refreshing…";
    try {
      const r = await (await fetch("/api/refresh", { method: "POST" })).json();
      let msg = `Fetched ${r.fetched} deals (${r.new} new)`;
      if (r.ai_scored) msg += `, AI-scored ${r.ai_scored}`;
      if (r.source_errors?.length) msg += ` — ${r.source_errors.length} source(s) failed`;
      toast(msg);
      await loadCategories(); await loadStores(); await loadDeals(); await loadStatus();
    } catch (e) { toast("Refresh failed: " + e); }
    btn.disabled = false; btn.textContent = "Refresh deals";
  };

  $("notify").onclick = async () => {
    try {
      const resp = await fetch("/api/notify", { method: "POST" });
      const body = await resp.json();
      toast(resp.ok ? `Posted ${body.posted} deals to Discord` : (body.detail || "Failed"));
    } catch (e) { toast("Discord post failed: " + e); }
  };

  let searchTimer;
  $("search").oninput = () => { clearTimeout(searchTimer); searchTimer = setTimeout(loadDeals, 250); };
  $("maxprice").oninput = () => { clearTimeout(searchTimer); searchTimer = setTimeout(loadDeals, 300); };
  $("store").onchange = loadDeals;
  $("age").onchange = loadDeals;
  $("order").onchange = loadDeals;

  renderItemChips(); loadCategories(); loadStores(); loadDeals(); loadStatus();
  setInterval(() => { loadCategories(); loadStores(); loadDeals(); loadStatus(); }, 60000);
</script>
</body>
</html>

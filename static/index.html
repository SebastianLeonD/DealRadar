<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DealRadar</title>
<style>
  :root {
    --ink: #111; --gray: #666; --lightgray: #ddd; --bg: #fff; --surface: #f6f6f6;
    --header: #000; --subnav: #2d2d2d; --sale: #d01345;
    --banner-blue: #cfe4ee; --banner-green: #e4ecc7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.5 "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  button { font-family: inherit; }

  /* ---------- black header ---------- */
  .topbar {
    background: var(--header); color: #fff; display: flex; align-items: center;
    gap: 18px; padding: 0 28px; height: 60px; position: sticky; top: 0; z-index: 10;
  }
  .logo { font-size: 26px; font-weight: 800; letter-spacing: -1px; text-transform: lowercase; }
  .logo span { color: #fff; }
  .tab {
    align-self: stretch; display: flex; align-items: center; padding: 0 18px;
    font-weight: 700; letter-spacing: 2px; font-size: 13px; color: #fff;
    background: #525252; cursor: default;
  }
  .searchwrap { flex: 1; display: flex; }
  .searchwrap .searchbox {
    flex: 1; display: flex; align-items: center; background: #fff; border-radius: 999px;
    padding: 0 6px 0 18px; height: 40px; max-width: 900px; margin: 0 auto; width: 100%;
  }
  .searchbox input {
    flex: 1; border: 0; outline: none; font-size: 14.5px; color: var(--ink); background: transparent;
  }
  .searchbox .mag { color: #444; font-size: 16px; padding: 0 8px; }
  .iconbtn {
    background: none; border: 0; color: #fff; font-size: 19px; cursor: pointer;
    padding: 8px 9px; border-radius: 8px; line-height: 1;
  }
  .iconbtn:hover { background: #2a2a2a; }
  .iconbtn:disabled { opacity: .4; cursor: wait; }

  /* ---------- dark category nav ---------- */
  .subnav {
    background: var(--subnav); color: #eee; display: flex; align-items: stretch;
    padding: 0 28px; height: 46px; overflow-x: auto; scrollbar-width: none;
    position: sticky; top: 60px; z-index: 9;
  }
  .subnav::-webkit-scrollbar { display: none; }
  .navitem {
    display: flex; align-items: center; padding: 0 15px; font-size: 13px;
    letter-spacing: .6px; cursor: pointer; white-space: nowrap; color: #e6e6e6;
    border-bottom: 3px solid transparent; text-transform: capitalize;
  }
  .navitem.trend { font-weight: 800; text-transform: uppercase; }
  .navitem:hover { background: #3a3a3a; }
  .navitem.active { border-bottom-color: #fff; font-weight: 700; color: #fff; }
  .navitem.sale {
    background: var(--sale); color: #fff; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1px; margin-left: 8px; align-self: center; padding: 6px 16px;
    border-bottom: 0; clip-path: polygon(0 0, 100% 0, 94% 100%, 0 100%);
  }
  .navitem.sale.active { outline: 2px solid #fff; outline-offset: -4px; }

  /* ---------- promo banners ---------- */
  .banners { display: flex; flex-wrap: wrap; }
  .banner {
    flex: 1 1 340px; text-align: center; padding: 12px 18px; font-size: 13.5px;
    letter-spacing: .4px; color: #1c2b33;
  }
  .banner b { letter-spacing: .6px; }
  .banner.blue { background: var(--banner-blue); }
  .banner.green { background: var(--banner-green); }
  .banner .sub { display: block; font-size: 12px; color: #3f5560; margin-top: 2px; }

  /* ---------- page frame ---------- */
  .page { max-width: 1380px; margin: 0 auto; padding: 0 28px 80px; }
  .crumbs { padding: 16px 0 4px; font-size: 12.5px; color: var(--gray); }
  .crumbs a { color: var(--gray); text-decoration: none; }
  .crumbs .sep { margin: 0 6px; }
  .titlerow { display: flex; align-items: baseline; gap: 16px; padding: 6px 0 14px; }
  .titlerow h2 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -.3px; }
  .stylecount { margin-left: auto; color: var(--gray); font-size: 13px; }

  /* ---------- sort / filter pills ---------- */
  .controls { display: flex; gap: 10px; padding-bottom: 18px; align-items: center; flex-wrap: wrap; }
  .pill {
    display: flex; align-items: center; gap: 8px; border: 1px solid var(--ink);
    background: #fff; border-radius: 4px; padding: 9px 16px; font-size: 13.5px;
    font-weight: 600; cursor: pointer; color: var(--ink);
  }
  .pill:hover { background: var(--surface); }
  .pill select {
    border: 0; outline: none; font: inherit; font-weight: 600; background: transparent;
    cursor: pointer; color: var(--ink);
  }
  .pill .icon { font-size: 15px; }
  .filterpanel {
    display: none; width: 100%; background: var(--surface); border: 1px solid var(--lightgray);
    border-radius: 6px; padding: 14px 16px; gap: 14px; flex-wrap: wrap; align-items: center;
  }
  .filterpanel.open { display: flex; }
  .filterpanel label { font-size: 12px; color: var(--gray); font-weight: 700; text-transform: uppercase; letter-spacing: .8px; }
  .filterpanel select, .filterpanel input {
    border: 1px solid var(--lightgray); background: #fff; border-radius: 4px;
    padding: 8px 10px; font: inherit; outline: none;
  }
  .filterpanel input[type=number] { width: 100px; }
  .chip {
    border: 1px solid var(--lightgray); background: #fff; border-radius: 999px;
    padding: 6px 14px; font-size: 12.5px; cursor: pointer; color: var(--ink);
  }
  .chip.active { background: var(--ink); border-color: var(--ink); color: #fff; font-weight: 600; }

  /* ---------- product grid ---------- */
  .grid {
    display: grid; gap: 28px 14px;
    grid-template-columns: repeat(auto-fill, minmax(225px, 1fr));
  }
  .card { cursor: pointer; }
  .imgbox {
    position: relative; aspect-ratio: 3 / 4; background: #eceff0; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .imgbox img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .25s ease; }
  .card:hover .imgbox img { transform: scale(1.04); }
  .imgbox .noimg { font-size: 52px; opacity: .25; }
  .scorebadge {
    position: absolute; top: 10px; left: 10px; background: #fff; color: var(--ink);
    font-size: 12px; font-weight: 800; border-radius: 3px; padding: 3px 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,.18);
  }
  .scorebadge.hi { color: #0a7d3b; } .scorebadge.lo { color: var(--sale); }
  .hotbadge {
    position: absolute; top: 10px; right: 10px; background: var(--sale); color: #fff;
    font-size: 11px; font-weight: 800; letter-spacing: .8px; border-radius: 3px; padding: 3px 8px;
  }
  .cardinfo { padding: 10px 2px 0; }
  .cardtitle {
    font-size: 13.5px; line-height: 1.45; color: var(--ink);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .cardprice { font-size: 15px; font-weight: 800; margin-top: 6px; }
  .cardmeta { font-size: 12px; color: var(--gray); margin-top: 3px; }
  .cardmeta b { color: var(--ink); font-weight: 600; }
  .empty { grid-column: 1 / -1; text-align: center; color: var(--gray); padding: 80px 0; font-size: 15px; }

  /* ---------- detail modal ---------- */
  .overlay {
    position: fixed; inset: 0; background: rgba(17,17,17,.55); z-index: 30;
    display: none; align-items: center; justify-content: center; padding: 24px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 6px; max-width: 920px; width: 100%; max-height: 92vh;
    overflow: auto; display: grid; grid-template-columns: minmax(0, 11fr) minmax(0, 9fr);
    box-shadow: 0 24px 80px rgba(0,0,0,.35);
  }
  @media (max-width: 720px) { .modal { grid-template-columns: 1fr; } }
  .modalimg {
    background: #eceff0; min-height: 380px; display: flex; align-items: center;
    justify-content: center; overflow: hidden;
  }
  .modalimg img { width: 100%; height: 100%; object-fit: cover; max-height: 88vh; }
  .modalimg .noimg { font-size: 100px; opacity: .22; }
  .modalbody { padding: 28px 26px; display: flex; flex-direction: column; gap: 13px; position: relative; }
  .modalbody h2 { margin: 0; font-size: 19px; line-height: 1.4; font-weight: 700; padding-right: 34px; }
  .bigprice { font-size: 26px; font-weight: 800; }
  .modalmeta { font-size: 13px; color: var(--gray); display: flex; gap: 7px; flex-wrap: wrap; }
  .modalmeta b { color: var(--ink); font-weight: 600; }
  .scoreline { font-size: 13.5px; }
  .scoreline b.hi { color: #0a7d3b; } .scoreline b.mid { color: #b57900; } .scoreline b.lo { color: var(--sale); }
  .take {
    background: var(--surface); border-left: 3px solid var(--ink); padding: 11px 14px;
    font-size: 13.5px; font-style: italic; color: #333;
  }
  a.gobtn {
    background: var(--ink); color: #fff; text-decoration: none; text-align: center;
    padding: 14px; font-weight: 800; font-size: 14px; letter-spacing: 1.2px;
    text-transform: uppercase; border-radius: 3px; margin-top: auto;
  }
  a.gobtn:hover { background: #333; }
  .close {
    position: absolute; top: 14px; right: 14px; background: none; border: 0;
    color: var(--gray); font-size: 22px; cursor: pointer; padding: 2px 6px;
  }
  .toast {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 11px 20px; border-radius: 4px;
    font-size: 13.5px; display: none; z-index: 40; box-shadow: 0 6px 24px rgba(0,0,0,.25);
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">deal<span>radar</span></div>
  <div class="tab">DEALS</div>
  <div class="searchwrap">
    <div class="searchbox">
      <input id="search" type="search" placeholder="Search for deals, items and brands">
      <span class="mag">⌕</span>
    </div>
  </div>
  <button class="iconbtn" id="refresh" title="Refresh deals now">⟳</button>
  <button class="iconbtn" id="notify" title="Post top 5 deals to Discord">🖈</button>
</div>

<div class="subnav" id="subnav"></div>

<div class="banners">
  <div class="banner blue">
    <b id="liveline">🟢 Live — connecting…</b>
    <span class="sub">sources re-checked automatically · board updates every 60s</span>
  </div>
  <div class="banner green">
    <b id="aibanner">AI deal scoring</b>
    <span class="sub" id="aibannersub">every deal rated 1–10 with a one-line verdict</span>
  </div>
</div>

<div class="page">
  <div class="crumbs">Home <span class="sep">›</span> Deals <span class="sep">›</span> <span id="crumbcat">All</span></div>
  <div class="titlerow">
    <h2 id="pagetitle">New In: All Deals</h2>
    <span class="stylecount" id="count"></span>
  </div>

  <div class="controls">
    <div class="pill" title="Sort order">
      <span class="icon">⇅</span>
      <select id="order">
        <option value="new" selected>Sort: Newest</option>
        <option value="best">Sort: Best score</option>
      </select>
    </div>
    <button class="pill" id="filterbtn"><span class="icon">⚟</span> Filter</button>
    <div class="filterpanel" id="filterpanel">
      <label>Item</label>
      <span id="itemChips"></span>
      <label>Store</label>
      <select id="store"><option value="All">All stores</option></select>
      <label>Max $</label>
      <input id="maxprice" type="number" min="0" step="1" placeholder="any">
      <label>Fresh</label>
      <select id="age">
        <option value="24">Last 24h</option>
        <option value="48" selected>Last 48h</option>
        <option value="168">Last 7d</option>
        <option value="">All time</option>
      </select>
    </div>
  </div>

  <div class="grid" id="grid"><div class="empty">Loading…</div></div>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
  let activeCategory = "All";
  let activeItem = "All";
  let saleMode = false;          // red SALE tab -> hottest deals (best score)
  let currentDeals = [];
  const ITEM_TYPES = ["All", "Jeans", "Shorts", "Tee", "Hoodie", "Jacket", "Sneaker", "Shoe", "Dress", "Sweater"];
  const $ = (id) => document.getElementById(id);

  function toast(msg) {
    const t = $("toast");
    t.textContent = msg; t.style.display = "block";
    clearTimeout(t._h); t._h = setTimeout(() => t.style.display = "none", 4000);
  }
  function esc(s) { const d = document.createElement("div"); d.textContent = s ?? ""; return d.innerHTML; }
  function scoreClass(s) { return s >= 8 ? "hi" : s >= 5 ? "mid" : "lo"; }

  function timeAgo(iso) {
    if (!iso) return "";
    const t = new Date(iso.includes("T") ? iso : iso.replace(" ", "T") + "Z");
    const mins = Math.max(0, Math.round((Date.now() - t) / 60000));
    if (mins < 60) return `${mins}m ago`;
    if (mins < 1440) return `${Math.round(mins / 60)}h ago`;
    return `${Math.round(mins / 1440)}d ago`;
  }

  async function loadStatus() {
    try {
      const s = await (await fetch("/api/status")).json();
      const when = s.last_refresh_at ? `sources checked ${timeAgo(s.last_refresh_at)}` : "first check pending";
      $("liveline").textContent = `🟢 Live — ${when} · auto-refresh every ${s.auto_refresh_minutes} min`;
      $("aibanner").textContent = s.ai_enabled ? "AI deal scoring: ON" : "AI deal scoring: off";
      $("aibannersub").textContent = s.ai_enabled
        ? "every new deal rated 1–10 with a one-line verdict"
        : "set ANTHROPIC_API_KEY to rate every deal 1–10";
    } catch { /* non-fatal */ }
  }

  async function loadCategories() {
    const { categories } = await (await fetch("/api/categories")).json();
    const total = categories.reduce((s, c) => s + c.n, 0);
    const items = [{ category: "All", n: total }, ...categories];
    $("subnav").innerHTML =
      `<div class="navitem trend ${!saleMode && activeCategory === "All" ? "active" : ""}" onclick="setCategory('All')">Trending</div>` +
      items.slice(1).map(c =>
        `<div class="navitem ${!saleMode && c.category === activeCategory ? "active" : ""}"
              onclick="setCategory('${c.category}')">${c.category}</div>`).join("") +
      `<div class="navitem sale ${saleMode ? "active" : ""}" onclick="toggleSale()">Hot 🔥</div>`;
  }

  function setCategory(cat) {
    activeCategory = cat; saleMode = false;
    loadCategories(); loadDeals();
  }
  function toggleSale() {
    saleMode = !saleMode;
    $("order").value = saleMode ? "best" : "new";
    loadCategories(); loadDeals();
  }

  function renderItemChips() {
    $("itemChips").innerHTML = ITEM_TYPES.map(t =>
      `<span class="chip ${t === activeItem ? "active" : ""}" onclick="setItem('${t}')">${t}</span>`
    ).join(" ");
  }
  function setItem(t) { activeItem = t; renderItemChips(); loadDeals(); }

  async function loadStores() {
    const { stores } = await (await fetch("/api/stores")).json();
    const sel = $("store");
    const current = sel.value;
    sel.innerHTML = `<option value="All">All stores</option>` +
      stores.map(s => `<option value="${esc(s.store)}">${esc(s.store)} (${s.n})</option>`).join("");
    if ([...sel.options].some(o => o.value === current)) sel.value = current;
  }

  function updateHeadings(n) {
    const catLabel = activeCategory === "All" ? "All Deals" : activeCategory;
    $("crumbcat").textContent = saleMode ? "Hot" : catLabel;
    $("pagetitle").textContent = saleMode ? "Hot Right Now 🔥" : `New In: ${catLabel}`;
    $("count").textContent = `${n} deal${n === 1 ? "" : "s"}`;
  }

  async function loadDeals() {
    const params = new URLSearchParams();
    if (activeCategory !== "All") params.set("category", activeCategory);
    if (activeItem !== "All") params.set("item", activeItem);
    const q = $("search").value.trim();
    if (q) params.set("q", q);
    const store = $("store").value;
    if (store && store !== "All") params.set("store", store);
    const maxPrice = $("maxprice").value;
    if (maxPrice) params.set("max_price", maxPrice);
    const age = $("age").value;
    if (age) params.set("max_age_hours", age);
    params.set("order", saleMode ? "best" : $("order").value);

    const { deals } = await (await fetch("/api/deals?" + params)).json();
    currentDeals = deals;
    updateHeadings(deals.length);
    if (!deals.length) {
      $("grid").innerHTML = `<div class="empty">Nothing fresh matches — widen the time window or hit ⟳ to refresh.</div>`;
      return;
    }
    $("grid").innerHTML = deals.map((d, i) => `
      <div class="card" onclick="openModal(${i})">
        <div class="imgbox">
          ${d.image_url
            ? `<img src="${esc(d.image_url)}" loading="lazy" alt=""
                   onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'noimg',textContent:'🛍️'}))">`
            : `<div class="noimg">🛍️</div>`}
          ${d.ai_score ? `<div class="scorebadge ${scoreClass(d.ai_score)}">★ ${d.ai_score}</div>` : ""}
          ${d.ai_score >= 9 ? `<div class="hotbadge">HOT</div>` : ""}
        </div>
        <div class="cardinfo">
          <div class="cardtitle">${esc(d.title)}</div>
          ${d.price != null ? `<div class="cardprice">$${d.price}</div>` : ""}
          <div class="cardmeta">${d.store ? `<b>${esc(d.store)}</b> · ` : ""}${esc(d.category)} · ${timeAgo(d.posted_at || d.fetched_at)}</div>
        </div>
      </div>`).join("");
  }

  function openModal(i) {
    const d = currentDeals[i];
    if (!d) return;
    $("modal").innerHTML = `
      <div class="modalimg">
        ${d.image_url
          ? `<img src="${esc(d.image_url)}" alt=""
                 onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'noimg',textContent:'🛍️'}))">`
          : `<div class="noimg">🛍️</div>`}
      </div>
      <div class="modalbody">
        <button class="close" onclick="closeModal()" title="Close">✕</button>
        <h2>${esc(d.title)}</h2>
        ${d.price != null ? `<div class="bigprice">$${d.price}</div>` : ""}
        <div class="modalmeta">
          ${d.store ? `<span><b>${esc(d.store)}</b></span> ·` : ""}
          <span>${esc(d.category)}</span> ·
          <span>via ${esc(d.source)}</span> ·
          <span>${timeAgo(d.posted_at || d.fetched_at)}</span>
        </div>
        ${d.ai_score ? `<div class="scoreline">AI deal score: <b class="${scoreClass(d.ai_score)}">${d.ai_score}/10</b></div>` : ""}
        ${d.ai_take ? `<div class="take">“${esc(d.ai_take)}”</div>` : ""}
        <a class="gobtn" href="${esc(d.url)}" target="_blank" rel="noopener">Open deal ↗</a>
      </div>`;
    $("overlay").classList.add("open");
  }
  function closeModal() { $("overlay").classList.remove("open"); }
  $("overlay").addEventListener("click", (e) => { if (e.target === $("overlay")) closeModal(); });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

  $("filterbtn").onclick = () => $("filterpanel").classList.toggle("open");

  $("refresh").onclick = async () => {
    const btn = $("refresh");
    btn.disabled = true;
    try {
      const r = await (await fetch("/api/refresh", { method: "POST" })).json();
      let msg = `Fetched ${r.fetched} deals (${r.new} new)`;
      if (r.ai_scored) msg += `, AI-scored ${r.ai_scored}`;
      if (r.source_errors?.length) msg += ` — ${r.source_errors.length} source(s) failed`;
      toast(msg);
      await loadCategories(); await loadStores(); await loadDeals(); await loadStatus();
    } catch (e) { toast("Refresh failed: " + e); }
    btn.disabled = false;
  };

  $("notify").onclick = async () => {
    try {
      const resp = await fetch("/api/notify", { method: "POST" });
      const body = await resp.json();
      toast(resp.ok ? `Posted ${body.posted} deals to Discord` : (body.detail || "Failed"));
    } catch (e) { toast("Discord post failed: " + e); }
  };

  let searchTimer;
  $("search").oninput = () => { clearTimeout(searchTimer); searchTimer = setTimeout(loadDeals, 250); };
  $("maxprice").oninput = () => { clearTimeout(searchTimer); searchTimer = setTimeout(loadDeals, 300); };
  $("store").onchange = loadDeals;
  $("age").onchange = loadDeals;
  $("order").onchange = () => { saleMode = false; loadCategories(); loadDeals(); };

  renderItemChips(); loadCategories(); loadStores(); loadDeals(); loadStatus();
  setInterval(() => { loadCategories(); loadStores(); loadDeals(); loadStatus(); }, 60000);
</script>
</body>
</html>
